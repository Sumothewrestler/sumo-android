name: Build APK

# Triggers:
#   - push to main         → builds + publishes the new APK
#   - manual "Run workflow" → handy when you want a fresh build without
#                             touching code (e.g. backend changed, want
#                             a sanity rebuild)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'local.properties.example'
      - 'plans/**'
  workflow_dispatch:

# Cancel in-flight builds when a newer push lands — saves CI minutes
# and avoids racing artifacts.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # The Android SDK comes pre-installed on the ubuntu-latest runner
      # via this action — saves us from doing sdkmanager dance.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Gradle wrapper JAR is intentionally not in the repo (binary file,
      # standard practice to regenerate). The runner has Gradle pre-
      # installed; we use it once to materialise the wrapper.
      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Bootstrapping Gradle wrapper..."
            gradle wrapper --gradle-version=8.6
          fi

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Compute artifact metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y%m%d-%H%M%S)
          APK_PATH=app/build/outputs/apk/debug/app-debug.apk
          NEW_NAME="sumo-${BUILD_DATE}-${SHORT_SHA}.apk"
          # Rename so each artifact has a unique, sortable name when
          # downloaded — Telegram/GitHub Releases overwrite same-named
          # files otherwise.
          cp "$APK_PATH" "$NEW_NAME"
          echo "apk_path=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          ls -lh "$NEW_NAME"

      # ---------- Distribution #1 — Upload as workflow artifact -------
      # Always-on. Even if Telegram + Release both fail, the APK is
      # downloadable from the Actions run page for 14 days.
      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sumo-apk
          path: ${{ steps.meta.outputs.apk_path }}
          retention-days: 14

      # ---------- Distribution #2 — GitHub Release (permalink) -------
      # Tags every successful main build with a stable URL you can open
      # in Chrome on your phone → tap APK → install. No login required
      # for private repos? Yes — you'll still need to sign into GitHub
      # in the phone browser once. After that, the link is permanent.
      - name: Publish to GitHub Release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.meta.outputs.build_date }}-${{ steps.meta.outputs.short_sha }}
          name: Sumo build ${{ steps.meta.outputs.build_date }}
          body: |
            Automatic debug build from `${{ github.sha }}`.

            **Install on phone:** tap the APK below. Android will ask
            "Allow Chrome to install unknown apps?" — allow once for
            this app + tap the file again.

            Backend: `api.pentadsumo.rfidpro.in`.
          files: ${{ steps.meta.outputs.apk_path }}
          prerelease: true     # marked as pre-release so it doesn't
                               # promote past stable tags
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Distribution #3 — Telegram (hands-free) ------------
      # Send the APK straight to your Telegram chat (or your bot's
      # Saved Messages equivalent). Only runs if you've configured the
      # two repo secrets — silently skipped otherwise so the workflow
      # still succeeds on a fresh clone.
      #
      # Setup (one-time, ~5 min):
      #   1. In Telegram, chat with @BotFather → /newbot → copy the
      #      "HTTP API token" it gives you.
      #   2. Send any message to your new bot (so it can DM you back).
      #   3. Open https://api.telegram.org/bot<TOKEN>/getUpdates and
      #      find your chat_id in the JSON (under "chat":{"id":...}).
      #   4. On GitHub repo → Settings → Secrets and variables →
      #      Actions → New repository secret:
      #         TELEGRAM_BOT_TOKEN = <token from step 1>
      #         TELEGRAM_CHAT_ID   = <chat_id from step 3>
      - name: Send APK to Telegram
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          APK_FILE: ${{ steps.meta.outputs.apk_path }}
          SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram secrets not configured — skipping. (see workflow comment for setup)"
            exit 0
          fi
          CAPTION="🆕 Sumo build \`${SHA}\`
          Tap to install on Android."
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT}" \
            -F "document=@${APK_FILE}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=Markdown" \
            > /tmp/tg_resp.json
          # Surface failures cleanly — Telegram returns {"ok":false,...}
          # with details. We don't want CI to silently send nothing.
          if grep -q '"ok":false' /tmp/tg_resp.json; then
            cat /tmp/tg_resp.json
            exit 1
          fi
          echo "Telegram delivery OK."

      - name: Build summary
        if: always()
        run: |
          echo "## Build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- APK: \`${{ steps.meta.outputs.apk_path }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
